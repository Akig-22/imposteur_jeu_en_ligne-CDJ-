<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Imposteur Chrétien</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 flex flex-col items-center">

    <h1 class="text-4xl font-bold text-gray-800 my-6">L'Imposteur Chrétien</h1>

    <div id="setup" class="bg-white p-8 rounded-xl shadow-lg w-full max-w-sm">
        <input id="name" placeholder="Ton nom" class="w-full border border-gray-300 rounded-lg p-3 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
        <button onclick="joinGame()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition">Entrer dans la partie</button>
    </div>

    <div id="game" style="display:none;" class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
        <p class="text-gray-600 mb-2">Joueurs présents : <span id="player-list" class="font-semibold text-gray-800"></span></p>
        <div id="status" class="text-lg text-gray-700 mb-6 font-medium">En attente des autres joueurs...</div>
        
        <button id="startButton" onclick="startGame()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition mb-4">Lancer la partie</button>
        
        <div id="turn-info" style="display:none;" class="space-y-4">
            <p id="tour-display" class="text-xl text-blue-600 font-bold">Tour : 1</p>
            <p id="turn-display" class="text-lg text-red-600 font-bold">C'est au tour de : ...</p>
            <div class="grid grid-cols-1 gap-2">
                <button onclick="passTurn()" class="bg-blue-500 hover:bg-blue-600 text-white py-2 rounded-lg">J'ai fini mon indice</button>
                <button onclick="addTour()" class="bg-gray-500 hover:bg-gray-600 text-white py-2 rounded-lg">Ajouter un tour</button>
                
                <button onclick="socket.emit('end-debate')" class="bg-yellow-500 hover:bg-yellow-600 text-white py-2 rounded-lg font-bold">Finir le débat</button>
                
                <button id="revealBtn" onclick="endGame()" style="display:none;" class="bg-red-600 hover:bg-red-700 text-white py-2 rounded-lg font-bold">Révéler l'Imposteur</button>
            </div>
        </div>
    </div>

    <div id="results" style="display:none;" class="bg-white p-8 rounded-xl shadow-lg w-full max-w-sm">
        <h2 class="text-2xl font-bold mb-4">Résultats de la partie</h2>
        <div id="result-list" class="text-left mb-6 space-y-2"></div>
        <button onclick="resetGame()" class="w-full bg-blue-600 text-white py-3 rounded-lg">Relancer une nouvelle partie</button>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        const socket = io(); 

        function joinGame() {
            const name = document.getElementById('name').value;
            if(name.trim() !== "") {
                socket.emit('join-game', name);
                document.getElementById('setup').style.display = 'none';
                document.getElementById('game').style.display = 'block';
            }
        }

        function startGame() { socket.emit('start-game'); }
        function passTurn() { socket.emit('pass-turn'); }
        function addTour() { socket.emit('add-tour'); }
        function endGame() { socket.emit('end-game'); }
        function resetGame() { socket.emit('reset-game'); }

        // Écouteur pour afficher le bouton de révélation
        socket.on('enable-reveal-button', () => {
            document.getElementById('revealBtn').style.display = 'block';
        });

        socket.on('status-msg', (msg) => { alert(msg); });

        socket.on('update-player-list', (names) => {
            document.getElementById('player-list').innerText = names.join(", ");
        });

        socket.on('game-started', (data) => {
            document.getElementById('status').innerHTML = `<h3 class="text-xl font-bold mb-2">${data.role}</h3><p class="text-2xl">${data.word}</p>`;
            document.getElementById('startButton').style.display = 'none';
            document.getElementById('turn-info').style.display = 'block';
        });

        socket.on('next-turn', (data) => {
            document.getElementById('tour-display').innerText = "Tour actuel : " + data.tour;
            document.getElementById('turn-display').innerText = "C'est au tour de : " + data.name;
        });

        socket.on('game-over', (results) => {
            document.getElementById('game').style.display = 'none';
            document.getElementById('results').style.display = 'block';
            let html = "<ul class='list-disc pl-5'>";
            results.forEach(p => {
                html += `<li class='text-lg'>${p.name} : <span class='font-bold'>${p.role}</span></li>`;
            });
            document.getElementById('result-list').innerHTML = html + "</ul>";
        });

        socket.on('reset-ui', () => { location.reload(); });
    </script>
</body>
</html>
